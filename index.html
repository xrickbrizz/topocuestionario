<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuestionario Práctico - Teodolito</title>
  <style>
    :root{
      --bg:#0f172a;
      --panel:#111827;
      --panel-2:#1e293b;
      --text:#e5e7eb;
      --muted:#94a3b8;
      --border:#243244;
      --good:#22c55e;
      --good-bg:#052e16;
      --bad:#ef4444;
      --bad-bg:#3f0a0a;
      --accent:#4f46e5;
      --accent-2:#6366f1;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: radial-gradient(1200px 800px at 20% 0%, #172554 0%, var(--bg) 45%);
      color:var(--text);
      min-height:100vh;
    }
    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:24px;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
      gap:16px;
    }
    .title{
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .title h1{
      margin:0;
      font-size:28px;
      line-height:1.1;
      letter-spacing:-0.02em;
    }
    .title p{
      margin:0;
      color:var(--muted);
      font-size:14px;
    }
    .pill{
      background:#0b1220;
      border:1px solid var(--border);
      border-radius:999px;
      padding:10px 14px;
      color:var(--muted);
      font-size:14px;
    }
    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:18px;
    }
    .card{
      background:rgba(17,24,39,.88);
      border:1px solid rgba(36,50,68,.8);
      border-radius:20px;
      box-shadow:0 20px 60px rgba(0,0,0,.30);
      overflow:hidden;
    }
    .card-head{
      padding:18px 20px 0 20px;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
    }
    .qmeta{
      color:var(--muted);
      font-size:13px;
      margin-bottom:8px;
    }
    .question{
      margin:0;
      font-size:22px;
      line-height:1.35;
      letter-spacing:-0.01em;
    }
    .progressbar{
      height:10px;
      width:100%;
      background:#0b1220;
      border-top:1px solid rgba(36,50,68,.8);
      border-bottom:1px solid rgba(36,50,68,.8);
      position:relative;
      margin-top:18px;
    }
    .progressbar > div{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,var(--accent),var(--accent-2));
      transition:width .25s ease;
    }
    .body{
      padding:20px;
    }
    .options{
      display:grid;
      gap:12px;
    }
    .option{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:16px;
      padding:16px 16px 14px 16px;
      cursor:pointer;
      transition:transform .12s ease, background .12s ease, border-color .12s ease;
      position:relative;
      overflow:hidden;
    }
    .option:hover{ transform:translateY(-1px); background:#162033; }
    .option .row{
      display:flex;
      align-items:flex-start;
      gap:12px;
    }
    .badge{
      min-width:28px;
      height:28px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      background:#0b1220;
      border:1px solid var(--border);
      color:var(--text);
      flex:0 0 auto;
    }
    .opt-text{
      font-size:16px;
      line-height:1.4;
      margin-top:1px;
      flex:1;
    }
    .feedback{
      margin-top:12px;
      padding-top:12px;
      border-top:1px dashed rgba(148,163,184,.22);
      color:#dbeafe;
      display:none;
      font-size:14px;
      line-height:1.45;
    }
    .status{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-weight:700;
      margin-bottom:6px;
    }
    .option.correct{
      border-color:rgba(34,197,94,.85);
      background:linear-gradient(180deg, rgba(5,46,22,.95), rgba(6,31,18,.95));
    }
    .option.correct .badge{ border-color:rgba(34,197,94,.85); color:#bbf7d0; background:rgba(34,197,94,.12); }
    .option.correct .feedback{ display:block; color:#bbf7d0; }
    .option.correct .status{ color:#86efac; }
    .option.incorrect{
      border-color:rgba(239,68,68,.85);
      background:linear-gradient(180deg, rgba(63,10,10,.95), rgba(40,10,10,.95));
    }
    .option.incorrect .badge{ border-color:rgba(239,68,68,.85); color:#fecaca; background:rgba(239,68,68,.10); }
    .option.incorrect .feedback{ display:block; color:#fecaca; }
    .option.incorrect .status{ color:#fca5a5; }
    .option.neutral{
      opacity:.85;
      background:#101826;
    }
    .option.neutral .feedback{ display:block; color:#cbd5e1; }
    .option.neutral .status{ color:#cbd5e1; }
    .option.locked{ cursor:default; }
    .footer{
      padding:18px 20px 20px 20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      border-top:1px solid rgba(36,50,68,.8);
      background:rgba(9,15,30,.55);
      flex-wrap:wrap;
    }
    .btns{ display:flex; gap:10px; flex-wrap:wrap; }
    button{
      border:none;
      border-radius:14px;
      padding:12px 16px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
    }
    .btn-primary{
      background:linear-gradient(90deg,var(--accent),var(--accent-2));
      color:white;
    }
    .btn-secondary{
      background:#0b1220;
      color:var(--text);
      border:1px solid var(--border);
    }
    .btn-primary:disabled, .btn-secondary:disabled{
      opacity:.55;
      cursor:not-allowed;
    }
    .hint{
      color:var(--muted);
      font-size:13px;
    }
    .summary{
      display:none;
      padding:22px 20px 22px 20px;
    }
    .summary h2{ margin:0 0 8px 0; font-size:24px; }
    .summary p{ margin:0; color:var(--muted); }
    .score{
      margin-top:14px;
      padding:14px 16px;
      border:1px solid var(--border);
      border-radius:16px;
      background:#0b1220;
      font-size:16px;
    }
    @media (max-width:760px){
      .title h1{ font-size:24px; }
      .question{ font-size:20px; }
      .card-head, .body, .footer, .summary{ padding-left:16px; padding-right:16px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <h1>Cuestionario práctico de topografía</h1>
        <p>Teodolito · 25 preguntas · selección múltiple y verdadero/falso</p>
      </div>
      <div class="pill" id="counter">1 / 25</div>
    </div>

    <div class="card">
      <div id="quizView">
        <div class="card-head">
          <div>
            <div class="qmeta" id="qMeta">Pregunta 1</div>
            <h2 class="question" id="question"></h2>
          </div>
        </div>
        <div class="progressbar"><div id="progress"></div></div>
        <div class="body">
          <div class="options" id="options"></div>
        </div>
        <div class="footer">
          <div class="hint" id="hint">Elegí una opción para ver la corrección y la explicación.</div>
          <div class="btns">
            <button class="btn-secondary" id="prevBtn">Anterior</button>
            <button class="btn-primary" id="nextBtn" disabled>Siguiente</button>
          </div>
        </div>
      </div>

      <div class="summary" id="summaryView">
        <h2>Terminaste el cuestionario 👏</h2>
        <p>Podés volver a recorrerlo o reiniciar para practicar otra vez.</p>
        <div class="score" id="scoreBox"></div>
        <div style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap;">
          <button class="btn-primary" id="restartBtn">Reiniciar</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const quiz = [
      {
        question: "Al centrar un teodolito con plomada óptica, después de atornillarlo al trípode, ¿cuál es el procedimiento correcto para hacer coincidir la plomada con la estaca?",
        options: [
          { text: "Calar inmediatamente el nivel tubular con los tornillos calantes.", correct: false, explanation: "No corresponde: el calado y la verticalización vienen después del centrado inicial." },
          { text: "Levantar dos patas del trípode (dejando una clavada) y observar por la plomada óptica moviéndolas hasta centrar.", correct: true, explanation: "Correcto: se usa la ayuda de las patas del trípode para lograr el centrado sobre la estaca." },
          { text: "Mover el tornillo de fijación central y arrastrar la plataforma.", correct: false, explanation: "Eso no es la técnica inicial; el deslizamiento solo se usa al final para afinar." }
        ]
      },
      {
        question: "Durante la verticalización, colocas el nivel de alidada paralelo a la línea de los tornillos calantes V1 y V2. ¿Cómo debes girar estos tornillos para centrar la burbuja?",
        options: [
          { text: "Ambos en el mismo sentido (horario).", correct: false, explanation: "No genera el efecto de palanca necesario para nivelar." },
          { text: "Solo girar V1, dejando V2 fijo.", correct: false, explanation: "No permite un calado correcto de la plataforma." },
          { text: "De forma simultánea y en sentido antagónico (contrario) de giro.", correct: true, explanation: "Correcto: el calado se hace con V1 y V2 en sentido contrario." }
        ]
      },
      {
        question: "Después de calar la burbuja con los tornillos V1 y V2, ¿qué paso sigue para utilizar el tornillo V3?",
        options: [
          { text: "Girar la alidada 180°.", correct: false, explanation: "Ese giro se usa luego como comprobación." },
          { text: "Girar la alidada 90°.", correct: true, explanation: "Correcto: se gira 90° para calar el tercer tornillo en dirección perpendicular." },
          { text: "Bajar las patas del trípode.", correct: false, explanation: "Las patas no se usan para este paso de nivelación fina." }
        ]
      },
      {
        question: "Giras la alidada 180° para verificar el calado y notas que la burbuja se desplaza de su centro. ¿Qué significa esto?",
        options: [
          { text: "Que el instrumento tiene un error de colimación.", correct: false, explanation: "La colimación afecta el apunte, no el comportamiento de la burbuja." },
          { text: "Que actúan dos errores: el del nivel tubular y el de verticalidad.", correct: true, explanation: "Correcto: el desplazamiento refleja falta de paralelismo y error de verticalidad." },
          { text: "Que el terreno ha cedido.", correct: false, explanation: "El desajuste observado corresponde a condiciones instrumentales y de estacionamiento." }
        ]
      },
      {
        question: "Estás en la posición de comprobación a 180° y la burbuja se ha desviado. Para corregir el error de verticalidad, ¿qué debes manipular?",
        options: [
          { text: "Los tornillos propios del nivel de alidada para corregir la mitad del desplazamiento.", correct: false, explanation: "Esos tornillos corrigen el nivel tubular, no la verticalidad del eje." },
          { text: "Los tornillos calantes V1 y V2 para corregir la mitad del desplazamiento.", correct: true, explanation: "Correcto: V1 y V2 corrigen la mitad del desplazamiento para lograr verticalidad." },
          { text: "Los tornillos calantes V1 y V2 para llevar la burbuja totalmente al centro.", correct: false, explanation: "No se corrige todo el desplazamiento con ellos; solo la mitad." }
        ]
      },
      {
        question: "Para que las mediciones no tengan error de colimación, el eje de colimación (C) debe cumplir una condición fundamental de fábrica. ¿Cuál es?",
        options: [
          { text: "Ser perpendicular al eje vertical (C ⟂ V).", correct: false, explanation: "No es la condición correcta del eje de colimación." },
          { text: "Ser paralelo al eje horizontal (C ≡ H).", correct: false, explanation: "No es la relación geométrica adecuada." },
          { text: "Ser perpendicular al eje horizontal (C ⟂ H).", correct: true, explanation: "Correcto: el eje de colimación debe ser perpendicular al eje horizontal." }
        ]
      },
      {
        question: "Quieres verificar en campo si tu teodolito sufre error de colimación. ¿Qué tipo de punto debes elegir para apuntar en Posición I y II?",
        options: [
          { text: "Un punto elevado a unos 45° sobre el horizonte.", correct: false, explanation: "Eso se usa para detectar el error de inclinación." },
          { text: "Un punto de fácil ubicación sobre el horizonte (elevación cercana a 0°).", correct: true, explanation: "Correcto: sobre el horizonte se anula la influencia de la inclinación." },
          { text: "Un punto en el piso (nadir).", correct: false, explanation: "No sirve para comprobar la colimación geométrica del anteojo." }
        ]
      },
      {
        question: "Tras apuntar a un punto en el horizonte en Posición I y Posición II, calculas la diferencia entre ambas lecturas y le restas 180°. ¿Qué resultado numérico obtienes?",
        options: [
          { text: "El rumbo correcto libre de error.", correct: false, explanation: "No, esa diferencia no entrega directamente el rumbo correcto." },
          { text: "El error de colimación exacto (c).", correct: false, explanation: "La diferencia da el doble del error, no el error simple." },
          { text: "El doble del error de colimación (2c).", correct: true, explanation: "Correcto: al restar 180° se obtiene el doble del error de colimación." }
        ]
      },
      {
        question: "Has calculado el rumbo correcto (LI) sin influencia de colimación y lo impones en el limbo. Al mirar por el anteojo, el punto ha quedado desapuntado. ¿Cómo corriges mecánicamente el aparato?",
        options: [
          { text: "Moviendo los montantes del anteojo.", correct: false, explanation: "Eso corrige el error de inclinación, no la colimación." },
          { text: "Desplazando la cruz de hilos del retículo para provocar nuevamente el apunte.", correct: true, explanation: "Correcto: se ajusta el retículo para materializar el nuevo eje de colimación." },
          { text: "Girando el teodolito desde la plataforma base.", correct: false, explanation: "Eso arruina el estacionamiento y la lectura." }
        ]
      },
      {
        question: "¿Qué ejes deben ser estrictamente perpendiculares entre sí para evitar el error de inclinación?",
        options: [
          { text: "El eje horizontal y el eje vertical (H ⟂ V).", correct: true, explanation: "Correcto: si no se cumple H ⟂ V aparece el error de inclinación." },
          { text: "El eje de colimación y el eje vertical (C ⟂ V).", correct: false, explanation: "No es la condición primaria que define la inclinación." },
          { text: "El eje del nivel esférico y la plomada.", correct: false, explanation: "No corresponde a las condiciones instrumentales del teodolito." }
        ]
      },
      {
        question: "A diferencia de la colimación, para verificar la influencia del error de inclinación necesitas apuntar a:",
        options: [
          { text: "Un punto sobre la línea del horizonte (h = 0°).", correct: false, explanation: "Ahí la tangente es cero y el error de inclinación se anula." },
          { text: "Un punto con una elevación cercana a 45° sobre el horizonte.", correct: true, explanation: "Correcto: a 45° la tangente vale 1 y el error aparece en su verdadera magnitud." },
          { text: "Un punto situado a más de 1 km de distancia, sin importar su altura.", correct: false, explanation: "La distancia no reemplaza a la altura angular, que es la variable crítica." }
        ]
      },
      {
        question: "Una vez impuesto el rumbo correcto (LI) para eliminar el error de inclinación, observas el objetivo elevado desapuntado. ¿Cómo reajustas el apunte mecánicamente?",
        options: [
          { text: "Ajustando los tornillos calantes V1 y V2.", correct: false, explanation: "Eso altera la verticalización, no la inclinación del anteojo." },
          { text: "Desplazando la cruz de hilos del retículo.", correct: false, explanation: "Eso modifica la colimación, no la inclinación." },
          { text: "Desplazando los montantes del anteojo.", correct: true, explanation: "Correcto: los montantes corrigen físicamente el error de inclinación." }
        ]
      },
      {
        question: "Tienes un teodolito descalibrado. ¿En qué orden exacto debes realizar la verificación y corrección de ejes?",
        options: [
          { text: "Primero Inclinación, luego Colimación.", correct: false, explanation: "Incorrecto: así las lecturas en altura quedarían viciadas." },
          { text: "Primero Colimación, luego Inclinación.", correct: true, explanation: "Correcto: primero colimación y luego inclinación para aislar correctamente los errores." },
          { text: "Es indistinto, ambos son independientes y no interfieren.", correct: false, explanation: "Sí interfieren; el orden importa." }
        ]
      },
      {
        question: "Según el material, los errores de verticalidad y centración se encuadran como errores de tipo:",
        options: [
          { text: "Instrumentales.", correct: false, explanation: "No dependen de una falla del mecanismo interno." },
          { text: "Naturales.", correct: false, explanation: "No son provocados por el ambiente." },
          { text: "Personales.", correct: true, explanation: "Correcto: dependen del cuidado y atención del operador." }
        ]
      },
      {
        question: "Verdadero o Falso: Si notas un error de centración sistemático, puedes corregirlo ajustando permanentemente los tornillos del teodolito.",
        options: [
          { text: "Verdadero.", correct: false, explanation: "Falso: la centración no se corrige permanentemente con tornillos del instrumento." },
          { text: "Falso.", correct: true, explanation: "Correcto: solo se puede centrar y verticalizar con precisión durante el estacionamiento." }
        ]
      },
      {
        question: "¿A qué concepto corresponde la definición: 'la menor división que el operador puede individualizar con certeza dentro de la menor división del sistema de lectura'?",
        options: [
          { text: "Apreciación angular.", correct: false, explanation: "La apreciación es una relación mecánica fija del instrumento." },
          { text: "Estimación angular.", correct: true, explanation: "Correcto: depende de la agudeza visual del operario." },
          { text: "Precisión de nonio.", correct: false, explanation: "Es un distractor que mezcla términos distintos." }
        ]
      },
      {
        question: "¿Cuál es la principal característica y función del limbo?",
        options: [
          { text: "Es la plataforma inferior con patas extensibles.", correct: false, explanation: "Eso corresponde al trípode o a la base, no al limbo." },
          { text: "Es un disco grabado y graduado de 0° a 360° para leer ángulos.", correct: true, explanation: "Correcto: el limbo es el disco graduado que permite obtener el valor angular horizontal." },
          { text: "Es la lente frontal biconvexa del anteojo.", correct: false, explanation: "Eso es el objetivo, no el limbo." }
        ]
      },
      {
        question: "Al mirar por el anteojo, además de la cruz filar principal ves dos hilos cortos paralelos al hilo horizontal. ¿Qué son y para qué sirven?",
        options: [
          { text: "Hilos estadimétricos, sirven para determinar distancias indirectamente.", correct: true, explanation: "Correcto: son los hilos estadimétricos usados para cálculo de distancias." },
          { text: "Guías de colimación, sirven para apuntar el nadir.", correct: false, explanation: "No es su función real." },
          { text: "Hilos de nivelación, sirven para verificar la inclinación.", correct: false, explanation: "No corresponden a esa función." }
        ]
      },
      {
        question: "Estás apuntando a un jalón muy distante y lo ves borroso. Para mejorar la nitidez del jalón específicamente, debes operar:",
        options: [
          { text: "El anillo de ajuste de la visual (junto al ojo).", correct: false, explanation: "Ese ajuste es para acomodar el ojo del operador, no el objeto." },
          { text: "El tornillo de enfoque del anteojo (tornillo ranurado).", correct: true, explanation: "Correcto: ese tornillo sirve para enfocar el objeto según su distancia." },
          { text: "Los tornillos de micrometría óptica.", correct: false, explanation: "Esos pertenecen al sistema de lectura angular." }
        ]
      },
      {
        question: "En el uso del trípode para un teodolito moderno con plomada óptica, para realizar el centrado, la indicación práctica inicial es:",
        options: [
          { text: "Clavar las 3 patas simultáneamente sobre la estaca y luego mirar por la plomada.", correct: false, explanation: "Dificulta el centrado preciso sobre la estaca." },
          { text: "Clavar solo 1 pata, dejar 2 levantadas y mover el conjunto mirándolo por la plomada óptica hasta centrar.", correct: true, explanation: "Correcto: se centra primero con una pata firme y dos levantadas, luego se terminan de clavar." },
          { text: "Clavar 2 patas y dejar 1 floja para moverla si la burbuja se sale.", correct: false, explanation: "No es el procedimiento descrito para el centrado inicial." }
        ]
      },
      {
        question: "¿Cuál de los siguientes niveles se corrige usando las patas extensibles del trípode (subiendo o bajando la longitud)?",
        options: [
          { text: "El nivel tubular de la alidada.", correct: false, explanation: "Ese se corrige con los tornillos calantes, no con las patas." },
          { text: "El nivel de anteojo.", correct: false, explanation: "No corresponde a esta fase de estacionamiento." },
          { text: "El nivel esférico de la plataforma.", correct: true, explanation: "Correcto: el nivel esférico se corrige ajustando las patas del trípode." }
        ]
      },
      {
        question: "Según las condiciones de fábrica, el eje vertical (V) es aquel que:",
        options: [
          { text: "Pasa por el centro focal de la lente y los hilos filares.", correct: false, explanation: "Eso describe el eje de colimación, no el vertical." },
          { text: "Atraviesa el centro de la alidada y el limbo extendiéndose del cenit al nadir.", correct: true, explanation: "Correcto: ese es el eje vertical del instrumento." },
          { text: "Es el eje de rotación (basculación) del lente telescópico.", correct: false, explanation: "Eso corresponde al eje horizontal." }
        ]
      },
      {
        question: "Estás rindiendo el examen y tu teodolito tiene un claro error de inclinación, pero no tienes permitido ajustarle los montantes. ¿Cómo consigues un rumbo válido para aprobar tu lectura?",
        options: [
          { text: "Apunto siempre a nivel del horizonte (h = 0°).", correct: false, explanation: "Eso no resuelve el problema para puntos elevados." },
          { text: "Tomo lectura en I Posición y en II Posición (vuelta de campana) sobre el mismo punto y promedio los resultados de minutos y segundos.", correct: true, explanation: "Correcto: al promediar ambas posiciones se anula la influencia del error de inclinación." },
          { text: "Multiplico la lectura por la tangente de 45°.", correct: false, explanation: "Eso no aplica como corrección práctica del rumbo." }
        ]
      },
      {
        question: "El teodolito se utiliza en topografía para planimetría de precisión. Esto significa que primordialmente su objetivo es obtener:",
        options: [
          { text: "Exclusivamente distancias por método de alineación a pasos.", correct: false, explanation: "Eso no define la planimetría de precisión." },
          { text: "La proyección horizontal de los puntos en el terreno.", correct: true, explanation: "Correcto: la planimetría busca la proyección horizontal de los puntos." },
          { text: "Diferencias de altitud a nivel del mar.", correct: false, explanation: "Eso corresponde a la altimetría." }
        ]
      },
      {
        question: "El teodolito posee tornillos de freno (fijación) y de movimientos lentos. ¿Cuándo debes usar el tornillo de movimientos lentos?",
        options: [
          { text: "Solo cuando el teodolito se descala durante la medición.", correct: false, explanation: "Si se descala, hay que reestacionar, no usar el movimiento lento." },
          { text: "Después de aflojar el freno, para dar vuelta de campana al anteojo.", correct: false, explanation: "La vuelta de campana se hace con el freno liberado, no con el movimiento lento." },
          { text: "Después de haber bloqueado el tornillo de fijación, para realizar un apunte preciso al milímetro en la cruz filar.", correct: true, explanation: "Correcto: primero se bloquea y luego se usa el movimiento lento para el ajuste fino." }
        ]
      }
    ];

    const letters = ["A", "B", "C", "D"];
    const state = {
      index: 0,
      answered: Array(quiz.length).fill(false),
      selectedByQ: Array(quiz.length).fill(null),
      score: 0,
      correctByQ: Array(quiz.length).fill(false)
    };

    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const counterEl = document.getElementById('counter');
    const qMetaEl = document.getElementById('qMeta');
    const progressEl = document.getElementById('progress');
    const hintEl = document.getElementById('hint');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const quizView = document.getElementById('quizView');
    const summaryView = document.getElementById('summaryView');
    const scoreBox = document.getElementById('scoreBox');
    const restartBtn = document.getElementById('restartBtn');

    function updateHeader() {
      counterEl.textContent = `${state.index + 1} / ${quiz.length}`;
      qMetaEl.textContent = `Pregunta ${state.index + 1}`;
      progressEl.style.width = `${((state.index) / quiz.length) * 100}%`;
      prevBtn.disabled = state.index === 0;
      nextBtn.disabled = !state.answered[state.index];
      nextBtn.textContent = state.index === quiz.length - 1 ? 'Finalizar' : 'Siguiente';
      hintEl.textContent = state.answered[state.index]
        ? 'Ya elegiste una respuesta. Podés pasar a la siguiente pregunta.'
        : 'Elegí una opción para ver si es correcta y revisar la explicación de cada alternativa.';
    }

    function renderQuestion() {
      const q = quiz[state.index];
      questionEl.textContent = q.question;
      optionsEl.innerHTML = '';
      q.options.forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.dataset.index = i;
        div.innerHTML = `
          <div class="row">
            <div class="badge">${letters[i] || String(i+1)}</div>
            <div class="opt-text">${opt.text}</div>
          </div>
          <div class="feedback"></div>
        `;
        div.addEventListener('click', () => handleAnswer(i));
        optionsEl.appendChild(div);
      });

      if (state.answered[state.index]) {
        revealCurrent(state.selectedByQ[state.index]);
      }
      updateHeader();
    }

    function handleAnswer(selectedIndex) {
      if (state.answered[state.index]) return;
      const q = quiz[state.index];
      const isCorrect = q.options[selectedIndex].correct;
      state.answered[state.index] = true;
      state.selectedByQ[state.index] = selectedIndex;
      state.correctByQ[state.index] = isCorrect;
      if (isCorrect) state.score += 1;
      revealCurrent(selectedIndex);
      updateHeader();
    }

    function revealCurrent(selectedIndex = null) {
      const q = quiz[state.index];
      const cards = [...optionsEl.querySelectorAll('.option')];
      cards.forEach((card, i) => {
        const opt = q.options[i];
        const fb = card.querySelector('.feedback');
        card.classList.add('locked');
        card.style.pointerEvents = 'none';

        if (opt.correct) {
          card.classList.add('correct');
          fb.innerHTML = `<div class="status">✓ Respuesta correcta</div>${escapeHtml(opt.explanation)}`;
        } else {
          card.classList.add('neutral');
          if (selectedIndex === i) {
            card.classList.remove('neutral');
            card.classList.add('incorrect');
            fb.innerHTML = `<div class="status">✕ No exactamente</div>${escapeHtml(opt.explanation)}`;
          } else {
            fb.innerHTML = `<div class="status">No correcta</div>${escapeHtml(opt.explanation)}`;
          }
        }
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function next() {
      if (!state.answered[state.index]) return;
      if (state.index === quiz.length - 1) {
        showSummary();
        return;
      }
      state.index += 1;
      renderQuestion();
    }

    function prev() {
      if (state.index === 0) return;
      state.index -= 1;
      renderQuestion();
    }

    function showSummary() {
      quizView.style.display = 'none';
      summaryView.style.display = 'block';
      scoreBox.textContent = `Puntaje: ${state.score} / ${quiz.length}`;
      progressEl.style.width = '100%';
      counterEl.textContent = `${quiz.length} / ${quiz.length}`;
    }

    function restart() {
      state.index = 0;
      state.score = 0;
      state.answered = Array(quiz.length).fill(false);
      state.correctByQ = Array(quiz.length).fill(false);
      summaryView.style.display = 'none';
      quizView.style.display = 'block';
      renderQuestion();
    }

    prevBtn.addEventListener('click', prev);
    nextBtn.addEventListener('click', next);
    restartBtn.addEventListener('click', restart);

    renderQuestion();
  </script>
</body>
</html>
